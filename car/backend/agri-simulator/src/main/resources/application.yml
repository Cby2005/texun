server:
  port: 8800

spring:
  application:
    name: agri-simulator
  config:
    import: "optional:nacos:agri-simulator.yml"
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:}
        group: DEFAULT_GROUP
      config:
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:}
        file-extension: yml
        group: DEFAULT_GROUP

  # ========== Kafka ==========
  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:127.0.0.1:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      retries: 3
      acks: all
    consumer:
      group-id: agri-simulator-group
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

# ========== еҰҜв„ғе«ҷйҚЈг„©еҺӨзјғ?==========
simulator:
  vehicle-count: 10              # й“Ҹж°ӯе«ҷжқһп№Ғз· йҸҒдјҙеҷә
  report-interval-ms: 5000       # й–¬гғҰзҘҙж¶“е©ғе§Өй—Ӯж’®ж®§й”ӣе ҹоҮ з»үжҺһзҙҡ
  base-latitude: 39.9042         # йҚ©е“„еҷҜз»ҫо„Җе®ій”ӣе қеҜіжөңо„Ҡзҙҡ
  base-longitude: 116.4074       # йҚ©е“„еҷҜзјҒеҝ“е®ій”ӣе қеҜіжөңо„Ҡзҙҡ

# ========== Actuator йҗ©жҲһеё¶ ==========
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when_authorized

# ========== йҸғгғҘз№” ==========
logging:
  level:
    com.agri.simulator: INFO
    org.springframework.kafka: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{traceId:-}] %logger{50} - %msg%n"
